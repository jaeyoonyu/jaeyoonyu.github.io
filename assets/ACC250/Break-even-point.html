<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Break-Even Tradeoff — Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0D1117;
  --bg2:    #161B22;
  --bg3:    #21262D;
  --bdr:    rgba(255,255,255,0.12);
  --text:   #E6EDF3;
  --text2:  #8B949E;
  --yellow: #FBBF24;   /* BEP / CM highlight */
}
html, body {
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
.page {
  width: 100%; height: 100%;
  display: flex; flex-direction: row; align-items: stretch;
  padding: 14px 18px;
  gap: 0;
}

/* ── LEFT SIDEBAR ── */
.left-sidebar {
  flex: 0 0 200px;
  display: flex; flex-direction: column;
  gap: 18px;
  padding-right: 16px;
  border-right: 1px solid var(--bdr);
}
.left-sidebar h1 {
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.03em; line-height: 1.2;
  color: var(--text);
}
.left-sidebar h1 em { color: var(--yellow); font-style: normal; }
.sidebar-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.2em; color: var(--text2);
  margin-bottom: 4px;
}

/* ── OPTIONS ── */
.options {
  display: flex; flex-direction: column;
  gap: 8px;
}
.option {
  background: var(--bg2);
  border: 2px solid var(--bdr);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  font-family: inherit; color: inherit;
  text-align: left;
  transition: border-color .18s, background .18s;
  display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
}
.option:hover { border-color: rgba(255,255,255,0.28); background: var(--bg3); }
.option.is-active { border-color: var(--yellow); background: rgba(251,191,36,0.07); }
.opt-badge {
  display: inline-block;
  font-size: 11px; font-weight: 800; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--bdr);
  padding: 2px 8px; border-radius: 4px;
  margin-bottom: 4px;
}
.option.is-active .opt-badge { color: var(--yellow); border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.1); }
.opt-name { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.opt-fc {
  font-size: 32px; font-weight: 900;
  color: var(--yellow); letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums; line-height: 1;
  margin-top: 2px;
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1 1 0; min-width: 0;
  display: flex; flex-direction: column;
  gap: 10px;
  padding-left: 18px;
}

/* ── MAIN ROW ── */
.main-row {
  flex: 1 1 0; min-height: 0;
  display: grid;
  grid-template-columns: 292px 1fr 330px;
  gap: 10px;
}

/* Shared panel */
.panel {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-title {
  flex: 0 0 auto;
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text2);
  padding: 11px 18px;
  border-bottom: 1px solid var(--bdr);
  background: var(--bg3);
}

/* Left column */
.left-col { display: flex; flex-direction: column; gap: 10px; }

/* Cost structure */
.cost-body { padding: 8px 16px 12px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }
.cost-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.cost-row:last-child { border-bottom: none; }
.cost-label { font-size: 19px; color: var(--text2); font-weight: 600; }
.cost-val { font-size: 40px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.cost-val.cm { color: var(--yellow); font-size: 48px; }

/* BEP panel */
.bep-body {
  padding: 10px 16px 14px; flex: 1;
  display: flex; flex-direction: column; justify-content: center; gap: 6px;
}
.bep-formula-row { font-size: 21px; color: var(--text2); font-weight: 500; }
.bep-formula-row strong { color: var(--text); font-weight: 700; }
.bep-calc-row { font-size: 23px; color: var(--text2); font-variant-numeric: tabular-nums; }
.bep-units {
  font-size: 76px; font-weight: 900; line-height: 1;
  color: var(--yellow); letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  margin: 6px 0 2px;
}

/* Chart panel */
.chart-panel {
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  display: flex; flex-direction: column;
  padding: 12px 14px 10px;
  overflow: hidden;
}
svg.chart {
  flex: 1; min-height: 0;
  width: 100%; height: 100%;
  display: block; overflow: visible;
}
.legend {
  flex: 0 0 auto;
  display: flex; gap: 22px; flex-wrap: wrap;
  padding-top: 9px;
  border-top: 1px solid var(--bdr);
  margin-top: 6px;
}
.legend-item {
  display: flex; align-items: center; gap: 9px;
  font-size: 17px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.swatch { width: 26px; height: 3px; border-radius: 2px; flex: 0 0 auto; }
.swatch.dashed { background: transparent; border-top: 2px dashed; height: 0; }
.swatch.fill { height: 14px; border-radius: 3px; }

/* Right column */
.right-col { display: flex; flex-direction: column; gap: 10px; }

/* Insight panel */
.insight-panel {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-left: 4px solid var(--yellow);
  border-radius: 10px;
  padding: 14px 18px;
  display: flex; flex-direction: column; gap: 8px;
  overflow: hidden;
}
.insight-text {
  font-size: 24px; line-height: 1.65; color: var(--text);
  font-weight: 500; flex: 1; overflow: hidden;
}
.insight-text em { color: var(--yellow); font-style: normal; font-weight: 800; }

/* ── BOTTOM TABLE (horizontal) ── */
.table-strip {
  flex: 0 0 auto;
  background: var(--bg2);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  overflow: hidden;
}
.table-title {
  font-size: 14px; font-weight: 800;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text2);
  padding: 10px 18px;
  border-bottom: 1px solid var(--bdr);
  background: var(--bg3);
}
.h-table {
  width: 100%; border-collapse: collapse;
  font-variant-numeric: tabular-nums;
}
.h-table thead th {
  font-size: 22px; font-weight: 800;
  color: var(--text2);
  padding: 10px 16px;
  text-align: right;
  border-right: 1px solid rgba(255,255,255,0.08);
  background: var(--bg3);
  white-space: nowrap;
}
.h-table thead th:first-child { text-align: left; min-width: 160px; }
.h-table thead th.col-loss   { background: rgba(248,113,113,0.20); color: #FCA5A5; }
.h-table thead th.col-profit { background: rgba(52,211,153,0.17); color: #6EE7B7; }
.h-table thead th.col-bep    { background: rgba(251,191,36,0.25); color: var(--yellow); }
.h-table tbody td {
  font-size: 24px; font-weight: 700;
  padding: 10px 16px; text-align: right;
  border-right: 1px solid rgba(255,255,255,0.08);
  border-top: 1px solid rgba(255,255,255,0.06);
  color: var(--text);
  white-space: nowrap;
}
.h-table tbody td:first-child {
  text-align: left; font-size: 17px; font-weight: 800;
  color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--bg3);
}
.h-table tbody td.col-loss   { background: rgba(248,113,113,0.15); color: #FCA5A5; }
.h-table tbody td.col-profit { background: rgba(52,211,153,0.13); color: #6EE7B7; }
.h-table tbody td.col-bep    { background: rgba(251,191,36,0.20); color: var(--yellow); font-weight: 900; }

/* SVG chart text */
.axis-tick  { font-family:'Inter',sans-serif; font-size:18px; font-weight:600; fill:#8B949E; font-variant-numeric:tabular-nums; }
.axis-label { font-family:'Inter',sans-serif; font-size:16px; font-weight:700; fill:#8B949E; text-transform:uppercase; letter-spacing:0.12em; }
.grid-line  { stroke:rgba(255,255,255,0.07); stroke-width:1; }
.axis-line  { stroke:rgba(255,255,255,0.22); stroke-width:1.5; }
.region-profit { fill:#34D399; opacity:0.13; }
.region-loss   { fill:#F87171; opacity:0.11; }
.region-label  { font-family:'Inter',sans-serif; font-size:28px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; }
.region-label.profit { fill:#34D399; opacity:0.85; }
.region-label.loss   { fill:#F87171; opacity:0.85; }
.annotation-text { font-family:'Inter',sans-serif; font-size:18px; font-weight:900; fill:#FBBF24; text-transform:uppercase; letter-spacing:0.08em; }
</style>
</head>
<body>
<div class="page">

  <!-- LEFT SIDEBAR -->
  <aside class="left-sidebar">
    <h1>Break-Even <em>Tradeoff</em></h1>
    <div>
      <div class="sidebar-label">Options</div>
      <div class="options" id="options">
        <button class="option" data-key="lean" type="button">
          <div class="opt-badge">Option A</div>
          <div class="opt-name">Manual</div>
          <div class="opt-fc">$20K</div>
        </button>
        <button class="option is-active" data-key="balanced" type="button">
          <div class="opt-badge">Option B</div>
          <div class="opt-name">Hybrid</div>
          <div class="opt-fc">$120K</div>
        </button>
        <button class="option" data-key="automated" type="button">
          <div class="opt-badge">Option C</div>
          <div class="opt-name">Automated</div>
          <div class="opt-fc">$400K</div>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">

  <!-- MAIN ROW -->
  <div class="main-row">

    <!-- LEFT: Cost Structure + BEP Calculation -->
    <div class="left-col">
      <div class="panel" style="flex:1.1;">
        <div class="panel-title">Cost Structure</div>
        <div class="cost-body" id="metrics"></div>
      </div>
      <div class="panel" style="flex:1;">
        <div class="panel-title">Break-Even Calculation</div>
        <div class="bep-body" id="bep"></div>
      </div>
    </div>

    <!-- CENTER: Chart -->
    <div class="chart-panel">
      <svg class="chart" id="chart" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="legend">
        <div class="legend-item"><span class="swatch" style="background:#60A5FA"></span>Revenue</div>
        <div class="legend-item"><span class="swatch" style="background:#F87171"></span>Total Cost</div>
        <div class="legend-item"><span class="swatch dashed" style="border-color:#6B7280"></span>Fixed Cost</div>
        <div class="legend-item"><span class="swatch fill" style="background:#34D399;opacity:.5"></span>Profit Zone</div>
        <div class="legend-item"><span class="swatch fill" style="background:#F87171;opacity:.4"></span>Loss Zone</div>
      </div>
    </div>

    <!-- RIGHT: Insight -->
    <div class="right-col">
      <div class="insight-panel">
        <p class="insight-text" id="insight"></p>
      </div>
    </div>

  </div>

  <!-- BOTTOM: Horizontal Profit Table -->
  <div class="table-strip">
    <div class="table-title">Profit &amp; Loss by Volume</div>
    <div id="scenarios"></div>
  </div>

  </div><!-- /.main-content -->

</div>
<script>
const PRICE = 100;

const PRESETS = {
  lean:      { FC:  20000, VC: 80 },
  balanced:  { FC: 120000, VC: 60 },
  automated: { FC: 400000, VC: 20 },
};

const FIXED_DOMAIN = { maxUnits: 10000, maxY: 1000000 };

// ── Formatting ──────────────────────────────────────────
const fmt$ = (n) => {
  if (!isFinite(n)) return '—';
  const sign = n < 0 ? '−' : '';
  return sign + '$' + Math.abs(Math.round(n)).toLocaleString('en-US');
};
const fmt$K = (n) => {
  if (!isFinite(n)) return '—';
  const sign = n < 0 ? '−' : '';
  const abs = Math.abs(Math.round(n));
  if (abs >= 1000) return sign + '$' + Math.round(abs / 1000) + 'K';
  return sign + '$' + abs;
};
const fmtUnitsK = (n) => Math.round(n) >= 1000 ? Math.round(n/1000)+'K' : String(Math.round(n));
function fmt$Clean(n) {
  const rounded = Math.round(n * 100) / 100;
  if (Math.abs(rounded - Math.round(rounded)) < 0.005) return '$' + Math.round(rounded).toLocaleString('en-US');
  return '$' + rounded.toFixed(2);
}
function nicerRound(v) {
  if (v <= 0) return 1;
  if (v < 100)     return Math.ceil(v / 10) * 10;
  if (v < 1000)    return Math.ceil(v / 100) * 100;
  if (v < 10000)   return Math.ceil(v / 500) * 500;
  if (v < 100000)  return Math.ceil(v / 5000) * 5000;
  if (v < 1000000) return Math.ceil(v / 50000) * 50000;
  return Math.ceil(v / 500000) * 500000;
}
function fmtAxis$(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
  if (n >= 1000)    return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}
function fmtAxisU(n) {
  if (n >= 10000) return Math.round(n/1000) + 'K';
  if (n >= 1000)  return (n/1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K';
  return n.toLocaleString();
}

// ── Cost Structure ──────────────────────────────────────
function renderMetrics(m) {
  document.getElementById('metrics').innerHTML = `
    <div class="cost-row">
      <span class="cost-label">Fixed Cost</span>
      <span class="cost-val">${fmt$K(m.FC)}</span>
    </div>
    <div class="cost-row">
      <span class="cost-label">Selling Price / Unit</span>
      <span class="cost-val">$${PRICE}</span>
    </div>
    <div class="cost-row">
      <span class="cost-label">Variable Cost / Unit</span>
      <span class="cost-val">${fmt$Clean(m.VC)}</span>
    </div>
    <div class="cost-row">
      <span class="cost-label">Contribution Margin</span>
      <span class="cost-val cm">${fmt$Clean(m.CM)}</span>
    </div>
  `;
}

// ── BEP Calculation ─────────────────────────────────────
function renderBep(m) {
  const hasBE = m.CM > 0 && isFinite(m.BEu);
  document.getElementById('bep').innerHTML = `
    <div class="bep-formula-row">BE Units &nbsp;=&nbsp; <strong>Fixed Cost</strong> ÷ <strong>CM/unit</strong></div>
    <div class="bep-calc-row">= ${fmt$K(m.FC)} ÷ ${fmt$Clean(m.CM)}</div>
    <div class="bep-units">${hasBE ? fmtUnitsK(m.BEu) : '∞'} <span style="font-size:30px;font-weight:700;color:#8B949E">units</span></div>
  `;
}

// ── Insight ─────────────────────────────────────────────
function renderInsight(m) {
  const texts = {
    lean:      `<em>Option A — Manual.</em> A lean, low-risk structure. Break-even arrives quickly at just <em>1,000 units</em> — attractive when demand is uncertain. But the variable cost stays high at <em>$80</em>, so each unit past break-even adds only <em>$20</em> to profit. <em>Low risk, low reward.</em> Best when sales volume is unpredictable.`,
    balanced:  `<em>Option B — Hybrid.</em> A balanced position. Break-even lands at <em>3,000 units</em> and each unit beyond that contributes <em>$40</em>. This structure suits firms with moderate, reasonably reliable sales expectations — enough volume to justify the investment, but not so dependent on it that a bad quarter is catastrophic.`,
    automated: `<em>Option C — Automated.</em> Aggressive automation. Break-even stretches to <em>5,000 units</em> — the firm must sell substantially more before earning its first dollar of profit. But each unit past break-even is worth a full <em>$80</em>. Profitable only with <em>high, steady volume</em>. Missing the forecast here hurts badly.`,
  };
  document.getElementById('insight').innerHTML = texts[m.key] || texts.balanced;
}

// ── Horizontal Profit Table ─────────────────────────────
function renderScenarios(m) {
  const volumes = [1000, 2000, 3000, 4000, 5000, 6000, 7000, 8000, 9000, 10000];

  const colCls = (v) => {
    if (m.CM > 0 && isFinite(m.BEu) && Math.abs(v - m.BEu) < 500) return 'col-bep';
    return (v * m.CM - m.FC) >= 0 ? 'col-profit' : 'col-loss';
  };

  const headers = volumes.map(v =>
    `<th class="${colCls(v)}">${v / 1000}K</th>`
  ).join('');

  const contribRow = volumes.map(v =>
    `<td class="${colCls(v)}">${fmt$K(v * m.CM)}</td>`
  ).join('');

  const fcStr = fmt$K(m.FC);
  const fcRow = volumes.map(v =>
    `<td class="${colCls(v)}">${fcStr}</td>`
  ).join('');

  const profitRow = volumes.map(v => {
    const profit = v * m.CM - m.FC;
    const cc = colCls(v);
    const str = profit < 0 ? `(${fmt$K(Math.abs(profit))})` : fmt$K(profit);
    return `<td class="${cc}">${str}</td>`;
  }).join('');

  document.getElementById('scenarios').innerHTML = `
    <table class="h-table">
      <thead><tr>
        <th></th>${headers}
      </tr></thead>
      <tbody>
        <tr><td>Contribution</td>${contribRow}</tr>
        <tr><td>Fixed Cost</td>${fcRow}</tr>
        <tr><td>Profit / (Loss)</td>${profitRow}</tr>
      </tbody>
    </table>
  `;
}

// ── Chart ───────────────────────────────────────────────
function renderChart(m, domainOverride) {
  const svg = document.getElementById('chart');
  const W = 1200, H = 460;
  const pad = { t: 24, r: 40, b: 58, l: 112 };
  const iw = W - pad.l - pad.r;
  const ih = H - pad.t - pad.b;

  const dom = domainOverride || (() => {
    let maxUnits = m.CM > 0 && isFinite(m.BEu) && m.BEu > 0
      ? nicerRound(m.BEu * 2.2) : nicerRound(Math.max(m.FC / 10, 1000));
    const maxY = nicerRound(Math.max(maxUnits * PRICE, m.FC + maxUnits * m.VC) * 1.05);
    return { maxUnits, maxY };
  })();
  const { maxUnits, maxY } = dom;
  const maxRev = maxUnits * PRICE;
  const maxTC  = m.FC + maxUnits * m.VC;

  const xS = (u) => pad.l + (u / maxUnits) * iw;
  const yS = (y) => pad.t + ih - (y / maxY) * ih;

  const revStart = { x: xS(0),        y: yS(0) };
  const revEnd   = { x: xS(maxUnits), y: yS(maxRev) };
  const tcStart  = { x: xS(0),        y: yS(m.FC) };
  const tcEnd    = { x: xS(maxUnits), y: yS(maxTC) };

  let bePoint = null;
  if (m.CM > 0 && isFinite(m.BEu) && m.BEu > 0 && m.BEu <= maxUnits) {
    bePoint = { x: xS(m.BEu), y: yS(m.BEu * PRICE) };
  }

  // Grid + ticks
  let grid = '';
  for (let i = 0; i <= 5; i++) {
    const y = pad.t + (ih * i) / 5;
    const val = maxY - (maxY * i) / 5;
    grid += `<line class="grid-line" x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" />`;
    grid += `<text class="axis-tick" x="${pad.l - 12}" y="${y + 5}" text-anchor="end">${fmtAxis$(val)}</text>`;
  }
  for (let i = 0; i <= 5; i++) {
    const x = pad.l + (iw * i) / 5;
    const val = Math.round((maxUnits * i) / 5);
    grid += `<text class="axis-tick" x="${x}" y="${H - pad.b + 22}" text-anchor="middle">${fmtAxisU(val)}</text>`;
  }

  // Regions
  let regions = '';
  if (bePoint) {
    regions += `<path class="region-loss"   d="M ${revStart.x} ${revStart.y} L ${bePoint.x} ${bePoint.y} L ${tcStart.x} ${tcStart.y} Z" />`;
    regions += `<path class="region-profit" d="M ${bePoint.x} ${bePoint.y} L ${revEnd.x} ${revEnd.y} L ${tcEnd.x} ${tcEnd.y} Z" />`;
  } else if (m.CM <= 0) {
    regions += `<path class="region-loss" d="M ${revStart.x} ${revStart.y} L ${revEnd.x} ${revEnd.y} L ${tcEnd.x} ${tcEnd.y} L ${tcStart.x} ${tcStart.y} Z" />`;
  }

  // Region labels
  let regionLabels = '';
  if (bePoint && m.BEu / maxUnits > 0.12 && m.BEu / maxUnits < 0.85) {
    const lx = (revStart.x + bePoint.x) / 2;
    const ly = (revStart.y + tcStart.y) / 2 + 6;
    regionLabels += `<text class="region-label loss"   x="${lx}" y="${ly}" text-anchor="middle">Loss</text>`;
    const px = (bePoint.x + revEnd.x) / 2;
    const py = (revEnd.y + tcEnd.y) / 2 + 6;
    regionLabels += `<text class="region-label profit" x="${px}" y="${py}" text-anchor="middle">Profit</text>`;
  }

  // Lines
  const lines = `
    <line x1="${xS(0)}" y1="${yS(m.FC)}" x2="${xS(maxUnits)}" y2="${yS(m.FC)}"
      stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7" />
    <line x1="${tcStart.x}" y1="${tcStart.y}" x2="${tcEnd.x}" y2="${tcEnd.y}"
      stroke="#F87171" stroke-width="2.5" />
    <line x1="${revStart.x}" y1="${revStart.y}" x2="${revEnd.x}" y2="${revEnd.y}"
      stroke="#60A5FA" stroke-width="2.5" />
  `;

  // BEP marker
  let beMarker = '';
  if (bePoint) {
    const labelRight = bePoint.x < pad.l + iw * 0.68;
    const tx = labelRight ? bePoint.x + 16 : bePoint.x - 16;
    const anchor = labelRight ? 'start' : 'end';
    beMarker = `
      <line x1="${bePoint.x}" y1="${bePoint.y}" x2="${bePoint.x}" y2="${H - pad.b}"
        stroke="#FBBF24" stroke-width="1" stroke-dasharray="3 3" opacity="0.6" />
      <circle cx="${bePoint.x}" cy="${bePoint.y}" r="12" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.4" />
      <circle cx="${bePoint.x}" cy="${bePoint.y}" r="5.5" fill="#FBBF24" />
      <text class="annotation-text" x="${tx}" y="${bePoint.y - 12}" text-anchor="${anchor}">Break-Even · ${fmtUnitsK(m.BEu)} units</text>
    `;
  }

  // Axes + titles
  const axes = `
    <line class="axis-line" x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${H - pad.b}" />
    <line class="axis-line" x1="${pad.l}" y1="${H - pad.b}" x2="${W - pad.r}" y2="${H - pad.b}" />
    <text class="axis-label" x="${pad.l + iw/2}" y="${H - 8}" text-anchor="middle">Units Sold</text>
    <text class="axis-label" transform="translate(26,${pad.t + ih/2}) rotate(-90)" text-anchor="middle">Revenue &amp; Cost ($)</text>
  `;

  svg.innerHTML = grid + regions + regionLabels + lines + axes + beMarker;
}

// ── Animation ────────────────────────────────────────────
const ANIM_DURATION = 1600;
const easeInOutCubic = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const lerp = (a, b, t) => a + (b - a) * t;

let currentState = null;
let animationId  = null;

function computeState(key) {
  const p = PRESETS[key];
  const FC = p.FC, VC = p.VC, CM = PRICE - VC;
  const BEu = CM > 0 ? FC / CM : Infinity;
  return { FC, VC, CM, BEu, key };
}

function interpState(a, b, t) {
  let BEu;
  const aFin = isFinite(a.BEu), bFin = isFinite(b.BEu);
  if (aFin && bFin)       BEu = lerp(a.BEu, b.BEu, t);
  else if (aFin && !bFin) BEu = a.BEu;
  else if (!aFin && bFin) BEu = b.BEu;
  else                    BEu = Infinity;
  return { FC: lerp(a.FC,b.FC,t), VC: lerp(a.VC,b.VC,t), CM: lerp(a.CM,b.CM,t), BEu };
}

function apply(key) {
  const newState = computeState(key);

  document.querySelectorAll('.option').forEach(el => {
    el.classList.toggle('is-active', el.dataset.key === key);
  });

  renderMetrics(newState);
  renderBep(newState);
  renderInsight(newState);
  renderScenarios(newState);

  if (animationId !== null) { cancelAnimationFrame(animationId); animationId = null; }

  if (currentState === null) {
    currentState = newState;
    renderChart(newState, FIXED_DOMAIN);
    return;
  }

  const fromState = { ...currentState };
  const startTime = performance.now();

  function frame() {
    const elapsed = performance.now() - startTime;
    const raw = Math.min(1, elapsed / ANIM_DURATION);
    const interp = interpState(fromState, newState, easeInOutCubic(raw));
    currentState = interp;
    renderChart(interp, FIXED_DOMAIN);
    if (raw < 1) { animationId = requestAnimationFrame(frame); }
    else { animationId = null; currentState = newState; }
  }
  animationId = requestAnimationFrame(frame);
}

document.querySelectorAll('.option').forEach(el => {
  el.addEventListener('click', () => apply(el.dataset.key));
});

apply('balanced');

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentState) {
      renderMetrics(currentState); renderBep(currentState);
      renderChart(currentState, FIXED_DOMAIN);
      renderScenarios(currentState);
    }
  }, 150);
});
</script>
